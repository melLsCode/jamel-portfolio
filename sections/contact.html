<!-- Contact Section -->
<section class="contact" id="contact">
  <div class="contact-glow"></div>
  <div class="section-header">
    <span class="section-tag">Get In Touch</span>
    <h2>Let's <span class="gradient-text">Work Together</span></h2>
    <p>Have a project in mind? Send a message and I'll get back within 24 hours.</p>
  </div>
  <div class="contact-inner">
    <div class="contact-info">
      <div class="contact-item">
        <div class="contact-icon-wrap"><i class="fas fa-envelope"></i></div>
        <div>
          <span class="contact-label">Email</span>
          <a href="mailto:4chanvaultchannel@gmail.com" class="contact-value">4chanvaultchannel@gmail.com</a>
        </div>
      </div>
      <div class="contact-item">
        <div class="contact-icon-wrap"><i class="fab fa-youtube"></i></div>
        <div>
          <span class="contact-label">YouTube</span>
          <span class="contact-value">@YourChannel</span>
        </div>
      </div>
      <div class="contact-item">
        <div class="contact-icon-wrap"><i class="fab fa-instagram"></i></div>
        <div>
          <span class="contact-label">Instagram</span>
          <span class="contact-value">@YourHandle</span>
        </div>
      </div>
      <div class="contact-item">
        <div class="contact-icon-wrap"><i class="fab fa-github"></i></div>
        <div>
          <span class="contact-label">GitHub</span>
          <span class="contact-value">@YourGithub</span>
        </div>
      </div>
      <div class="social-row">
        <a href="#" class="social-btn" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
        <a href="#" class="social-btn" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="#" class="social-btn" aria-label="Twitter"><i class="fab fa-x-twitter"></i></a>
        <a href="#" class="social-btn" aria-label="GitHub"><i class="fab fa-github"></i></a>
        <a href="#" class="social-btn" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
      </div>
    </div>
    <form class="contact-form" id="contactForm" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required />
        </div>
      </div>
      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" placeholder="Project inquiry" />
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Tell me about your project..." required></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-full">
        Send Message <i class="fas fa-paper-plane"></i>
      </button>
      <div class="form-feedback" id="formFeedback"></div>
    </form>
  </div>
</section>
